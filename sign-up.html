    <div class="form-outside-2">
    <form id="form-signup">
            <div class="form-inside">
                    <span class="sub-2-form">Sign Up to Anime Art Academy</span>
                    <label for="signup-name" class="main-2-form">Full name</label>
                    <input type="text" name="user_name" required class="form-bar-1" id="signup-name">
                    <label for="signup-email" class="main-2-form">Email Address</label>
                    <input type="text" name="user_email" required class="form-bar-1" id="signup-email">
                    <div class="form-2-outside">
                        <div class="form-2-inside">
                            <label for="signup-password" class="main-2-form">Password</label>
                            <input type="password" name="user_password" required class="form-bar-2-left" id="signup-password" autocomplete="on">
                                </div>
                                <div class="form-2-inside">
                                    <label for="signup-password-re" class="main-2-form">Confirm Password</label>
                            <input type="password" name="user_password" required class="form-bar-2-right" id="signup-password-re" autocomplete="on">
                        </div>
                    </div>

                    <div class="main-2-form">
                    <input type="checkbox" name="user-promotional" required>I agree to receive instructional and promotional emails
                </div>
                    <div class="main-2-form">
                        <input type="checkbox" name="user-terms"  required>I agree to <strong>Teachable's</strong> <a href="#" class="main-4">Terms of Use</a> & <a href="" class="main-4">Privacy Policy</a><br>and<strong> Anime Art Academy's</strong><a href="" class="main-4"> Terms of Use</a> & <a href="" class="main-4">Privacy Policy.</a>
                    </div>
                    <div class="btn-form">
                        <button type="submit" class="btn btn-section1" id="signup">Sign up</button>
                    </div>
                    <div class="form-line"></div>
                    <div class="form-footer">
                        <a href="login.html" class="article-form">

                          Log In With a School Account
                        </a>
                    </div>
                </div>
